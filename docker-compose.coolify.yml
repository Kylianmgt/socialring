services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://socialring:${DB_PASSWORD}@db:5432/socialring
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://socialring.lekiks.fr}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_TRUST_HOST=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    ports:
      - '7850:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: socialring
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: socialring
    volumes:
      - socialring-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U socialring']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  socialring-pgdata:
